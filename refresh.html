<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تحديث Camp Raad Dojo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#0a1628;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;direction:rtl}
.box{text-align:center;padding:40px 24px;max-width:360px;width:100%}
.logo{font-size:48px;margin-bottom:16px}
h2{font-size:20px;font-weight:700;margin-bottom:8px}
p{color:rgba(255,255,255,.6);font-size:13px;margin-bottom:28px;line-height:1.6}
.loader{width:44px;height:44px;border:3px solid rgba(255,255,255,.15);border-top-color:#C41E3A;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 20px}
@keyframes spin{to{transform:rotate(360deg)}}
.step{font-size:12px;color:rgba(255,255,255,.45);margin-top:12px;min-height:18px}
.done{color:#4ade80;font-weight:700;font-size:15px;margin-top:20px;display:none}
</style>
</head>
<body>
<div class="box">
  <div class="logo">🥊</div>
  <h2>Camp Raad Dojo</h2>
  <p>جاري مسح البيانات القديمة وتحميل أحدث نسخة من لوحة التحكم…</p>
  <div class="loader" id="loader"></div>
  <div class="step" id="step">جاري التنظيف…</div>
  <div class="done" id="done">✅ تم! جاري التحويل…</div>
</div>
<script>
var step = document.getElementById('step');
var done = document.getElementById('done');
var loader = document.getElementById('loader');

async function cleanAndRedirect(){
  step.textContent = '🗑️ مسح الكاش…';
  // 1. Clear all browser caches
  if('caches' in window){
    try{
      var keys = await caches.keys();
      await Promise.all(keys.map(function(k){ return caches.delete(k); }));
    }catch(e){}
  }

  step.textContent = '🔧 إلغاء تسجيل Service Workers القديمة…';
  // 2. Unregister all old service workers
  if('serviceWorker' in navigator){
    try{
      var regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(function(r){ return r.unregister(); }));
    }catch(e){}
  }

  step.textContent = '🧹 مسح البيانات المحلية…';
  // 3. Clear participant localStorage
  try{
    localStorage.removeItem('camp_participants');
    localStorage.removeItem('camp_staff');
    localStorage.removeItem('data_version');
    localStorage.removeItem('camp_files');
  }catch(e){}

  step.textContent = '⬇️ تحميل النسخة الجديدة…';
  // 4. Small delay then redirect with cache-busting timestamp
  await new Promise(function(r){ setTimeout(r, 800); });

  loader.style.display = 'none';
  step.style.display = 'none';
  done.style.display = 'block';

  await new Promise(function(r){ setTimeout(r, 600); });
  window.location.replace('camp-dashboard.html?cv=4&_=' + Date.now());
}

cleanAndRedirect();
</script>
</body>
</html>
